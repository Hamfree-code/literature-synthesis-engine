name: tests

# v3.2 §13: CI must run the full pytest suite; a red suite blocks the report build.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # The v3.2 methodology engines are dependency-light by design, so the
        # suite needs only these (no network/API/Supabase deps).
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic numpy jinja2

      - name: Run methodology + integration test suite
        run: python -m pytest -q
